version: 2.1

parameters:
  docker-img:
    type: string
    default: ''

commands:
  timeout:
    parameters:
      duration:
        default: '15m'
        type: string
    steps:
      - run:
          name: Cancel job after <<parameters.duration>>
          background: true
          command: |
            sleep <<parameters.duration>>
            echo "Cancelling job as <<parameters.duration>> has elapsed"
            curl --fail -X POST -H "Circle-Token: ${CIRCLE_TOKEN}" "https://circleci.com/api/v1.1/project/github/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/${CIRCLE_BUILD_NUM}/cancel"

  start-db:
    parameters:
      docker-img:
        type: string
        default: 'docker.io/arangodb/enterprise:latest'
      topology:
        type: string
        default: 'single'
      ssl:
        type: string
        default: 'false'
      compression:
        type: string
        default: 'false'
    steps:
      - run:
          name: Start Database
          command: bash ./docker/start_db.sh
          environment:
            DOCKER_IMAGE: <<parameters.docker-img>>
            STARTER_MODE: <<parameters.topology>>
            STARTER_DOCKER_IMAGE: 'docker.io/arangodb/arangodb-starter:0.18.5'
            SSL: <<parameters.ssl>>
            COMPRESSION: <<parameters.compression>>

executors:
  n22:
    docker:
      - image: cimg/node:22.17
  n24:
    docker:
      - image: cimg/node:24.4

jobs:
  node-test:
    parameters:
      docker-img:
        type: string
        default: 'docker.io/arangodb/enterprise:latest'
      topology:
        type: string
        default: 'single'
      ssl:
        type: string
        default: 'false'
      http_proto:
        type: enum
        enum: ['h1', 'h2']
        default: 'h1'
      node:
        type: enum
        enum: ['n22', 'n24']
      module-system:
        type: enum
        enum: ['cjs', 'esm']
      resource_class:
        type: string
        default: medium
    executor: <<parameters.node>>
    resource_class: <<parameters.resource_class>>
    steps:
      - timeout
      - checkout
      - setup_remote_docker
      - start-db:
          docker-img: <<parameters.docker-img>>
          topology: <<parameters.topology>>
          ssl: <<parameters.ssl>>
      - run:
          name: Install system packages
          command: |
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends jq curl
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Run tests
          command: |
            set -euo pipefail
            SCHEME=http
            if [ "<<parameters.ssl>>" = "true" ]; then
              SCHEME=https
              export NODE_TLS_REJECT_UNAUTHORIZED=0
            fi
            if [ "<<parameters.topology>>" = "cluster" ]; then
              export TEST_ARANGODB_URL="${SCHEME}://172.28.0.1:8529,${SCHEME}://172.28.0.1:8539,${SCHEME}://172.28.0.1:8549"
              export TEST_ARANGO_LOAD_BALANCING_STRATEGY=ROUND_ROBIN
            else
              export TEST_ARANGODB_URL="${SCHEME}://172.28.0.1:8529"
            fi
            if [ "<<parameters.http_proto>>" = "h2" ]; then
              export TEST_ARANGO_HTTP_VERSION=2.0
            else
              export TEST_ARANGO_HTTP_VERSION=1.1
            fi
            export ARANGO_RELEASE="<<parameters.docker-img>>"
            export CI=true
            npm run test:<<parameters.module-system>>

workflows:
  # Node.js 22.x + 24.x (current LTS pair per arangojs compatibility policy).
  # Two pinned DB images; each matrix is topology × SSL × HTTP stack × nodes × modules (32 jobs each, 64 total). Names must stay unique per cell.
  integration-tests-multi-runtime-multi-db-image:
    when:
      not: <<pipeline.parameters.docker-img>>
    jobs:
      - node-test:
          name: <<matrix.node>>-<<matrix.topology>>-ssl<<matrix.ssl>>-<<matrix.http_proto>>-<<matrix.module-system>>-312
          filters:
            branches:
              ignore: stable
          matrix:
            parameters:
              docker-img:
                - 'docker.io/arangodb/enterprise:3.12'
              node:
                - 'n22'
                - 'n24'
              topology:
                - 'single'
                - 'cluster'
              ssl:
                - 'true'
                - 'false'
              http_proto:
                - 'h1'
                - 'h2'
              module-system:
                - 'cjs'
                - 'esm'
      - node-test:
          name: <<matrix.node>>-<<matrix.topology>>-ssl<<matrix.ssl>>-<<matrix.http_proto>>-<<matrix.module-system>>-4.0-nightly
          filters:
            branches:
              ignore: stable
          matrix:
            parameters:
              docker-img:
                - 'docker.io/arangodb/enterprise-preview:4.0-nightly'
              node:
                - 'n22'
                - 'n24'
              topology:
                - 'single'
                - 'cluster'
              ssl:
                - 'true'
                - 'false'
              http_proto:
                - 'h1'
                - 'h2'
              module-system:
                - 'cjs'
                - 'esm'

  integration-tests-given-db-image-full-matrix:
    when: <<pipeline.parameters.docker-img>>
    jobs:
      - node-test:
          name: <<matrix.node>>-<<matrix.topology>>-ssl<<matrix.ssl>>-<<matrix.http_proto>>-<<matrix.module-system>>
          filters:
            branches:
              ignore: stable
          matrix:
            parameters:
              docker-img:
                - <<pipeline.parameters.docker-img>>
              node:
                - 'n22'
                - 'n24'
              topology:
                - 'single'
                - 'cluster'
              ssl:
                - 'true'
                - 'false'
              http_proto:
                - 'h1'
                - 'h2'
              module-system:
                - 'cjs'
                - 'esm'
