# One job only: enterprise:latest, Node 23, single topology, CJS, HTTP (ssl false).
# Set ARANGO_LICENSE_KEY on the CircleCI project for Enterprise images.
workflows:
  test-enterprise-single-cjs:
    jobs:
      - node-test:
          name: enterprise-latest-n23-single-cjs
          filters:
            branches:
              ignore: stable
          docker-img: docker.io/arangodb/enterprise:latest
          topology: single
          ssl: 'false'
          node: n23
          module-system: cjs
