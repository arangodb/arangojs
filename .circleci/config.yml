version: 2.1

parameters:
  docker-img:
    type: string
    default: ''

commands:
  timeout:
    parameters:
      duration:
        default: '15m'
        type: string
    steps:
      - run:
          name: Cancel job after <<parameters.duration>>
          background: true
          command: |
            sleep <<parameters.duration>>
            echo "Cancelling job as <<parameters.duration>> has elapsed"
            curl --fail -X POST -H "Circle-Token: ${CIRCLE_TOKEN}" "https://circleci.com/api/v1.1/project/github/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/${CIRCLE_BUILD_NUM}/cancel"

  start-db:
    parameters:
      docker-img:
        type: string
        default: 'docker.io/arangodb/enterprise:latest'
      topology:
        type: string
        default: 'single'
      ssl:
        type: string
        default: 'false'
      compression:
        type: string
        default: 'false'
    steps:
      - run:
          name: Start Database
          command: bash ./docker/start_db.sh
          environment:
            DOCKER_IMAGE: <<parameters.docker-img>>
            STARTER_MODE: <<parameters.topology>>
            STARTER_DOCKER_IMAGE: 'docker.io/arangodb/arangodb-starter:0.18.5'
            SSL: <<parameters.ssl>>
            COMPRESSION: <<parameters.compression>>

executors:
  n22:
    docker:
      - image: cimg/node:22.17
  n24:
    docker:
      - image: cimg/node:24.4

jobs:
  node-test:
    parameters:
      docker-img:
        type: string
        default: 'docker.io/arangodb/enterprise:latest'
      topology:
        type: string
        default: 'single'
      ssl:
        type: string
        default: 'false'
      http_proto:
        type: enum
        enum: ['h1', 'h2']
        default: 'h1'
      node:
        type: enum
        enum: ['n22', 'n24']
      module-system:
        type: enum
        enum: ['cjs', 'esm']
      resource_class:
        type: string
        default: medium
    executor: <<parameters.node>>
    resource_class: <<parameters.resource_class>>
    steps:
      - timeout
      - checkout
      - setup_remote_docker
      - start-db:
          docker-img: <<parameters.docker-img>>
          topology: <<parameters.topology>>
          ssl: <<parameters.ssl>>
      - run:
          name: Install system packages
          command: |
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends jq curl
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Run tests
          command: |
            set -euo pipefail
            SCHEME=http
            if [ "<<parameters.ssl>>" = "true" ]; then
              SCHEME=https
              export NODE_TLS_REJECT_UNAUTHORIZED=0
            fi
            if [ "<<parameters.topology>>" = "cluster" ]; then
              export TEST_ARANGODB_URL="${SCHEME}://172.28.0.1:8529,${SCHEME}://172.28.0.1:8539,${SCHEME}://172.28.0.1:8549"
              export TEST_ARANGO_LOAD_BALANCING_STRATEGY=ROUND_ROBIN
            else
              export TEST_ARANGODB_URL="${SCHEME}://172.28.0.1:8529"
            fi
            if [ "<<parameters.http_proto>>" = "h2" ]; then
              export TEST_ARANGO_HTTP_VERSION=2.0
            else
              export TEST_ARANGO_HTTP_VERSION=1.1
            fi
            export ARANGO_RELEASE="<<parameters.docker-img>>"
            export CI=true
            npm run test:<<parameters.module-system>>

  browser-smoke:
    parameters:
      docker-img:
        type: string
    executor: n24
    resource_class: medium
    steps:
      - timeout
      - checkout
      - setup_remote_docker
      - start-db:
          docker-img: <<parameters.docker-img>>
          topology: single
          ssl: 'false'
      - run:
          name: Map arangodb hostname for smoke proxy
          command: echo "172.28.0.1 arangodb" | sudo tee -a /etc/hosts
      - run:
          name: Install Chromium dependencies for Puppeteer
          command: |
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              ca-certificates fonts-liberation \
              libasound2t64 libatk-bridge2.0-0t64 libatk1.0-0t64 libcairo2 libcups2t64 \
              libdbus-1-3 libdrm2 libexpat1 libfontconfig1 libgbm1 libglib2.0-0t64 \
              libgtk-3-0t64 libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 \
              libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxdamage1 libxext6 \
              libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6
      - run:
          name: Install dependencies and build
          command: |
            sudo apt-get install -y --no-install-recommends jq curl
            npm install
            npm run build
      - run:
          name: Run browser smoke test
          command: node smoke-test.mjs

workflows:
  # 16 jobs: single-server only. HTTP/1.1 (default http_proto). 2 DB × 2 Node × 2 SSL × 2 module systems.
  integration-single-topology:
    when:
      not: <<pipeline.parameters.docker-img>>
    jobs:
      - node-test:
          name: single-<<matrix.node>>-ssl<<matrix.ssl>>-<<matrix.module-system>>-312
          topology: single
          filters:
            branches:
              ignore: stable
          matrix:
            parameters:
              docker-img:
                - 'docker.io/arangodb/enterprise:3.12'
              node:
                - 'n22'
                - 'n24'
              ssl:
                - 'true'
                - 'false'
              module-system:
                - 'cjs'
                - 'esm'
      - node-test:
          name: single-<<matrix.node>>-ssl<<matrix.ssl>>-<<matrix.module-system>>-4.0-nightly
          topology: single
          filters:
            branches:
              ignore: stable
          matrix:
            parameters:
              docker-img:
                - 'docker.io/arangodb/enterprise-preview:4.0-nightly'
              node:
                - 'n22'
                - 'n24'
              ssl:
                - 'true'
                - 'false'
              module-system:
                - 'cjs'
                - 'esm'

  # 16 jobs: cluster only. HTTP/1.1 (default http_proto). Same matrix as single.
  integration-cluster-topology:
    when:
      not: <<pipeline.parameters.docker-img>>
    jobs:
      - node-test:
          name: cluster-<<matrix.node>>-ssl<<matrix.ssl>>-<<matrix.module-system>>-312
          topology: cluster
          filters:
            branches:
              ignore: stable
          matrix:
            parameters:
              docker-img:
                - 'docker.io/arangodb/enterprise:3.12'
              node:
                - 'n22'
                - 'n24'
              ssl:
                - 'true'
                - 'false'
              module-system:
                - 'cjs'
                - 'esm'
      - node-test:
          name: cluster-<<matrix.node>>-ssl<<matrix.ssl>>-<<matrix.module-system>>-4.0-nightly
          topology: cluster
          filters:
            branches:
              ignore: stable
          matrix:
            parameters:
              docker-img:
                - 'docker.io/arangodb/enterprise-preview:4.0-nightly'
              node:
                - 'n22'
                - 'n24'
              ssl:
                - 'true'
                - 'false'
              module-system:
                - 'cjs'
                - 'esm'

  # 2 jobs: HTTP/1.1 vs HTTP/2 on a fixed "best" stack (Enterprise 3.12, Node 24, ESM, TLS, single).
  integration-http-proto-smoke:
    when:
      not: <<pipeline.parameters.docker-img>>
    jobs:
      - node-test:
          name: http-proto-h1-smoke
          filters:
            branches:
              ignore: stable
          docker-img: 'docker.io/arangodb/enterprise:3.12'
          topology: single
          ssl: 'true'
          http_proto: h1
          node: n24
          module-system: esm
      - node-test:
          name: http-proto-h2-smoke
          filters:
            branches:
              ignore: stable
          docker-img: 'docker.io/arangodb/enterprise:3.12'
          topology: single
          ssl: 'true'
          http_proto: h2
          node: n24
          module-system: esm

  # 2 jobs: browser bundling smoke (Puppeteer) on pinned DB images.
  browser-smoke:
    when:
      not: <<pipeline.parameters.docker-img>>
    jobs:
      - browser-smoke:
          name: browser-smoke-312
          filters:
            branches:
              ignore: stable
          docker-img: 'docker.io/arangodb/enterprise:3.12'
      - browser-smoke:
          name: browser-smoke-4.0-nightly
          filters:
            branches:
              ignore: stable
          docker-img: 'docker.io/arangodb/enterprise-preview:4.0-nightly'

  # Manual / pipeline-parameter image: full matrix without http_proto dimension (16 jobs).
  integration-tests-given-db-image-full-matrix:
    when: <<pipeline.parameters.docker-img>>
    jobs:
      - node-test:
          name: <<matrix.node>>-<<matrix.topology>>-ssl<<matrix.ssl>>-<<matrix.module-system>>
          filters:
            branches:
              ignore: stable
          matrix:
            parameters:
              docker-img:
                - <<pipeline.parameters.docker-img>>
              node:
                - 'n22'
                - 'n24'
              topology:
                - 'single'
                - 'cluster'
              ssl:
                - 'true'
                - 'false'
              module-system:
                - 'cjs'
                - 'esm'