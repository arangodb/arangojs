# CircleCI config for arangojs (https://github.com/arangodb/arangojs).
# Modeled after arangodb-java-driver/.circleci/config.yml: remote Docker, ./docker/start_db.sh,
# pipeline parameter docker-img, and version/topology workflows.
#
# Prerequisite: copy the java driver's docker/ directory into the arangojs repo root (start_db.sh,
# jwtHeader, jwtSecret, server.pem, find_active_endpoint.sh).
#
# start_db.sh sets root password to empty. Enterprise images require ARANGO_LICENSE_KEY on the project.
#
# Workflows (mutually exclusive via pipeline parameter docker-img):
# - docker-img empty → test-enterprise-latest (fixed docker.io/arangodb/enterprise:latest), 24 jobs.
# - docker-img set   → test-docker-img-parameter (that image), 24 jobs.
# Matrix per workflow: 3 nodes × 2 topologies × 2 SSL × 2 module-system = 24.

version: 2.1

parameters:
  docker-img:
    type: string
    default: ''

commands:
  timeout:
    parameters:
      duration:
        default: '15m'
        type: string
    steps:
      - run:
          name: Cancel job after <<parameters.duration>>
          background: true
          command: |
            sleep <<parameters.duration>>
            echo "Cancelling job as <<parameters.duration>> has elapsed"
            curl --fail -X POST -H "Circle-Token: ${CIRCLE_TOKEN}" "https://circleci.com/api/v1.1/project/github/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/${CIRCLE_BUILD_NUM}/cancel"

  start-db:
    parameters:
      docker-img:
        type: string
        default: 'docker.io/arangodb/enterprise:latest'
      topology:
        type: string
        default: 'single'
      ssl:
        type: string
        default: 'false'
      compression:
        type: string
        default: 'false'
    steps:
      - run:
          name: Start Database
          # bash avoids exit 126 when scripts are not chmod +x in the Git index (common on Windows).
          command: bash ./docker/start_db.sh
          environment:
            DOCKER_IMAGE: <<parameters.docker-img>>
            STARTER_MODE: <<parameters.topology>>
            STARTER_DOCKER_IMAGE: 'docker.io/arangodb/arangodb-starter:0.18.5'
            SSL: <<parameters.ssl>>
            COMPRESSION: <<parameters.compression>>

executors:
  n20:
    docker:
      - image: cimg/node:20.18
  n22:
    docker:
      - image: cimg/node:22.16
  n23:
    docker:
      - image: cimg/node:23.5

jobs:
  node-test:
    parameters:
      docker-img:
        type: string
        default: 'docker.io/arangodb/enterprise:latest'
      topology:
        type: string
        default: 'single'
      ssl:
        type: string
        default: 'false'
      node:
        type: enum
        enum: ['n20', 'n22', 'n23']
      module-system:
        type: enum
        enum: ['cjs', 'esm']
      resource_class:
        type: string
        default: medium
    executor: <<parameters.node>>
    resource_class: <<parameters.resource_class>>
    steps:
      - timeout
      - checkout
      - setup_remote_docker
      - start-db:
          docker-img: <<parameters.docker-img>>
          topology: <<parameters.topology>>
          ssl: <<parameters.ssl>>
      - run:
          name: Install system packages
          command: |
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends jq curl
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Run tests
          command: |
            set -euo pipefail
            SCHEME=http
            if [ "<<parameters.ssl>>" = "true" ]; then
              SCHEME=https
              export NODE_TLS_REJECT_UNAUTHORIZED=0
            fi
            if [ "<<parameters.topology>>" = "cluster" ]; then
              export TEST_ARANGODB_URL="${SCHEME}://172.28.0.1:8529,${SCHEME}://172.28.0.1:8539,${SCHEME}://172.28.0.1:8549"
              export TEST_ARANGO_LOAD_BALANCING_STRATEGY=ROUND_ROBIN
            else
              export TEST_ARANGODB_URL="${SCHEME}://172.28.0.1:8529"
            fi
            export ARANGO_RELEASE="<<parameters.docker-img>>"
            export CI=true
            npm run test:<<parameters.module-system>>

workflows:
  test-enterprise-latest:
    when:
      not: <<pipeline.parameters.docker-img>>
    jobs:
      - node-test:
          name: latest-<<matrix.node>>-<<matrix.topology>>-ssl<<matrix.ssl>>-<<matrix.module-system>>
          filters:
            branches:
              ignore: stable
          matrix:
            parameters:
              docker-img:
                - 'docker.io/arangodb/enterprise:latest'
              node:
                - 'n20'
                - 'n22'
                - 'n23'
              topology:
                - 'single'
              ssl:
                - 'true'
                - 'false'
              module-system:
                - 'cjs'
                - 'esm'

  test-docker-img-parameter:
    when: <<pipeline.parameters.docker-img>>
    jobs:
      - node-test:
          name: param-<<matrix.node>>-<<matrix.topology>>-ssl<<matrix.ssl>>-<<matrix.module-system>>
          filters:
            branches:
              ignore: stable
          matrix:
            parameters:
              docker-img:
                - <<pipeline.parameters.docker-img>>
              node:
                - 'n20'
                - 'n22'
                - 'n23'
              topology:
                - 'single'
              ssl:
                - 'true'
                - 'false'
              module-system:
                - 'cjs'
                - 'esm'
